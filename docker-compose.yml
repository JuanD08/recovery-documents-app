version: '3.8'

services:
  # CONTENEDOR 1: LA BASE DE DATOS
  db:
    image: mysql:8.0
    container_name: recovery_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: recovery_documents_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Esto inyecta tu SQL y crea las tablas automáticamente en una BD limpia
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # CONTENEDOR 2: NUESTRO SERVIDOR NODE.JS
  app:
    build: .
    container_name: recovery_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=recovery_documents_db
      - JWT_SECRET=tu_secreto_super_seguro_123
    depends_on:
      db:
        condition: service_healthy

# Esto asegura que los datos de MySQL no se borren en el futuro
volumes:
  db_data: